    <linearGradient id="base" x1="0" y1="344" x2="0" y2="408" gradientUnits="userSpaceOnUse">
      <stop stop-color="#252838"/>
      <stop offset="1" stop-color="#1A1C28"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="412" x2="0" y2="510" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1C1E2C"/>
      <stop offset="1" stop-color="#14161F"/>
    </linearGradient>
    <linearGradient id="lampArm" x1="308" y1="100" x2="320" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3A3C48"/>
      <stop offset="1" stop-color="#2E3040"/>
    </linearGradient>
  </defs>

