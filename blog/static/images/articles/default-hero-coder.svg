<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600" fill="none" role="img" aria-label="Programmer working at night with glowing laptop screen">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D0F18"/>
      <stop offset="1" stop-color="#12162A"/>
    </linearGradient>
    <radialGradient id="screenGlow" cx="700" cy="260" r="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4D9FFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#4D9FFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lampGlow" cx="310" cy="200" r="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB042" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#FFB042" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lid" x1="480" y1="90" x2="480" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2A2D3A"/>
      <stop offset="1" stop-color="#1E2030"/>
    </linearGradient>
    <linearGradient id="editorBg" x1="0" y1="104" x2="0" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E1E2E"/>
      <stop offset="1" stop-color="#11111B"/>
